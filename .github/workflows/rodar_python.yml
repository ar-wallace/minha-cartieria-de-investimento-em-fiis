name: Executar Script de FIIs

on:
  schedule:
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - name: Baixar código do repositório
      uses: actions/checkout@v3

    - name: Configurar o Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Forçar Instalação das Dependências
      run: python -m pip install --upgrade pip && pip install requests beautifulsoup4

    - name: Rodar o script de cálculo
      run: python carteira.py

    - name: Salvar e subir alterações no index.html
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add index.html
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automação: Relatório atualizado" && git push)
