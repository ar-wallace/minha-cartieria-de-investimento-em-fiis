name: Atualizar Carteira com Selenium

on:
  schedule:
    - cron: '0 12 * * *' # Roda todo dia ao meio-dia (ajuste se quiser)
  workflow_dispatch: # Permite que você clique no botão para rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo do repositorio
        uses: actions/checkout@v3

      - name: Configurar o Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 selenium webdriver-manager

      - name: Executar Script de Atualizacao
        run: python carteira.py

      - name: Salvar e subir alteracoes para o GitHub
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Tabela atualizada automaticamente com Selenium" && git push)
