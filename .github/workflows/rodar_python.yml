name: Executar Script de FIIs

on:
  schedule:
    - cron: '0 12 * * 1-5' # Roda de segunda a sexta às 12:00 UTC
  workflow_dispatch: # Permite que você rode manualmente se quiser

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar código do repositório
      uses: actions/checkout@v3

    - name: Configurar o Python
      uses: actions/setup-python@v4
      with:
        python-node-version: '3.10'

    - name: Instalar dependências necessárias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Rodar o script de cálculo
      run: python carteira.py

    - name: Salvar e subir alterações no index.html
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add index.html
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automação: Relatório atualizado" && git push)
