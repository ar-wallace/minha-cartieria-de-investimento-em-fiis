name: Executar Carteira Python

permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar código do repositório
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Agora instalamos o pandas direto, sem depender de arquivo de texto!
    - name: Instalar dependências
      run: |
        pip install pandas

    - name: Rodar script da carteira
      run: |
        python carteira.py

    - name: Salvar alterações no repositório
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add index.html
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automação: Relatório updated" && git push)
